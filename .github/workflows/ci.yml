name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-mock:
    name: Build mock backend (net8.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build src/TeklaMcp.Server/TeklaMcp.Server.csproj -c Release

  build-windows:
    name: Build Windows + Tekla (net48)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build solution
        run: dotnet build TeklaMcp.sln -c Release
