name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build solution (net48 + net8.0)
        run: dotnet build TeklaMcp.sln -c Release

      - name: Pack Windows (Tekla) artifact
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME".TrimStart('v')
          $source = "src/TeklaMcp.Server/bin/Release/net48"
          if (-not (Test-Path "$source/TeklaMcp.Server.exe")) {
            throw "Expected $source/TeklaMcp.Server.exe — build may have failed."
          }
          $zip = "TeklaMcp.Server-$version-net48-win-x64.zip"
          Compress-Archive -Path "$source/*" -DestinationPath $zip -Force
          Write-Host "Created $zip"

      - name: Pack mock backend artifact
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME".TrimStart('v')
          dotnet publish src/TeklaMcp.Server/TeklaMcp.Server.csproj `
            -f net8.0 -c Release -o publish/net8.0
          $zip = "TeklaMcp.Server-$version-net8.0-mock.zip"
          Compress-Archive -Path "publish/net8.0/*" -DestinationPath $zip -Force
          Write-Host "Created $zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
          body_path: docs/releases/${{ github.ref_name }}.md
          files: |
            TeklaMcp.Server-*-net48-win-x64.zip
            TeklaMcp.Server-*-net8.0-mock.zip
          fail_on_unmatched_files: true
